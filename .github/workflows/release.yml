name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            exe_suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            exe_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            exe_suffix: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            exe_suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          package="daily_git-${version}-${{ matrix.target }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "package=${package}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          package="${{ steps.meta.outputs.package }}"
          mkdir -p "dist/${package}/templates"
          cp "target/${{ matrix.target }}/release/daily_git${{ matrix.exe_suffix }}" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
          cp config.yaml "dist/${package}/config.example.yaml"
          cp templates/* "dist/${package}/templates/"

      - name: Create tar.gz archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          package="${{ steps.meta.outputs.package }}"
          tar -C dist -czf "dist/${package}.tar.gz" "$package"

      - name: Create zip archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "${{ steps.meta.outputs.package }}"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package }}
          path: dist/${{ steps.meta.outputs.package }}.${{ matrix.archive_ext }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: daily_git-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
